<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz sobre mim</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>O quanto você me conhece? 🤔</h1>

    <h2 id="pergunta"></h2>

    <div class="opcoes" id="opcoes"></div>

    <div id="resultado"></div>

</div>

<script>
const quiz = [
    {
        pergunta: "O que eu mais gosto de fazer?",
        opcoes: ["Ver anime", "jogar", "Dormir", "Comer"],
        correta: 1
    },
    {
        pergunta: "Onde eu Gostaria de morar?",
        opcoes: ["Brasil", "Canada", "Japão", "EUA"],
        correta: 1
    },
    {
        pergunta: "O que mais me irrita?",
        opcoes: ["Barulho", "Injustiça", "Acordar cedo", "Calor"],
        correta: 1
    }
    {
        pergunta: "Qual o meu jogo favorito entre meus jogos favoritos?",
        opcoes: ["OneShot", "Hollow Knight", "Undertale", "Cuphead"],
        correta: 2
    },
    {
        pergunta: "Qual o meu anime FAVORITO?",
        opcoes: ["ONEEEE PIECEE!!", "Naruto", "Boku no Hero", "Dragon Ball"],
        correta: 0
    },
     {
        pergunta: "Qual meu maior medo?",
        opcoes: ["Escuro", "Cachorros", "Ficar sozinho", "Morrer"],
        correta: 2
    },
    {
        pergunta: "Qual time de futebol eu torço?",
        opcoes: ["Palmeiras", "Flamengo", "Santos", "Barcelona"],
        correta: 0
    },
     {
        pergunta: "Qual ou quais são minhas cores favoritas?",
        opcoes: ["Marrom, azul e branco", "Roxo, vermelho e preto", "LARANJA", "Rosa, amarelo e verde"],
        correta: 1
    },
    {
        pergunta: "Qual dessas frases é mentira?",
        opcoes: ["Eu tenho medo de cachorro", "Eu nunca tirei 0 na escola", "Eu nunca pilotei uma moto", "Eu já peguei em uma cobra(Lá ele)"],
        correta: 2
    },
    {
        pergunta: "Qual é o meu tamanho?",
        opcoes: ["181cm", "177cm", "19,5cm", "174cm"],
        correta: 1
    }
];

let indice = 0;
let pontos = 0;

function carregarPergunta() {
    const pergunta = quiz[indice];

    document.getElementById("pergunta").innerText = pergunta.pergunta;

    const opcoesDiv = document.getElementById("opcoes");
    opcoesDiv.innerHTML = "";

    pergunta.opcoes.forEach((opcao, i) => {
        const div = document.createElement("div");
        div.classList.add("opcao");
        div.innerText = opcao;

        div.onclick = () => verificar(div, i);

        opcoesDiv.appendChild(div);
    });
}

function verificar(elemento, i) {
    const correta = quiz[indice].correta;
    const opcoes = document.querySelectorAll(".opcao");

    opcoes.forEach((op, index) => {
        op.onclick = null;

        if (index === correta) {
            op.classList.add("correta");
        } else if (index === i) {
            op.classList.add("errada");
        }
    });

    if (i === correta) {
        pontos++;
    }

    setTimeout(() => {
        indice++;

        if (indice < quiz.length) {
            carregarPergunta();
        } else {
            mostrarResultado();
        }
    }, 1000);
}

function mostrarResultado() {
    document.getElementById("pergunta").style.display = "none";
    document.getElementById("opcoes").style.display = "none";

    const resultado = document.getElementById("resultado");
    resultado.style.display = "block";

    resultado.innerHTML = `
        <h2>Resultado final</h2>
        <p>Você acertou ${pontos} de ${quiz.length}</p>
    `;
}

carregarPergunta();
</script>

</body>
</html>
